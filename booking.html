<section class="booking">

<h1>Room Booking Form</h1>
</section>

<form action="#" method="post">

<fieldset>

<legend>Guest Information</legend>

<label for="name">Full Name</label>
<input type="text" id="name" name="name"
placeholder="Enter your full name"
required minlength="3">

<label for="email">Email Address</label>
<input type="email" id="email" name="email"
placeholder="example@gmail.com"
required>

<label for="password">Password</label>
<input type="password" id="password" name="password"
placeholder="Create password"
required minlength="6">

<label for="phone">Phone Number</label>
<input type="text" id="phone" name="phone"
placeholder="+25261XXXXXXX"
required>

<label for="checkin">Check In Date</label>
<input type="date" id="checkin" name="checkin" required>

<label for="checkout">Check Out Date</label>
<input type="date" id="checkout" name="checkout" required>

<label for="room">Room Type</label>

<select id="room" name="room">

<option>Select Room</option>
<option>Single Room</option>
<option>Double Room</option>
<option>Deluxe Room</option>
<option>Luxury Suite</option>

</select>

</fieldset>

<br>

<fieldset>

<legend>Payment Method</legend>

<input type="radio" id="cash" name="payment">
<label for="cash">Cash</label>

<input type="radio" id="card" name="payment">
<label for="card">Credit Card</label>

<input type="radio" id="mobile" name="payment">
<label for="mobile">Mobile Payment</label>

</fieldset>

<br>

<fieldset>

<legend>Extra Services</legend>

<input type="checkbox" id="wifi">
<label for="wifi">Free Wi-Fi</label><br>

<input type="checkbox" id="breakfast">
<label for="breakfast">Breakfast</label><br>

<input type="checkbox" id="airport">
<label for="airport">Airport Pickup</label><br>

<input type="checkbox" id="pool">
<label for="pool">Swimming Pool</label>

</fieldset>

<br>

<label for="message">Special Request</label>

<textarea id="message"
rows="6"
placeholder="Write your message here..."></textarea>

<br><br>

</form>

</section>
